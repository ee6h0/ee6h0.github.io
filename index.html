<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ee6h0</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">
    <style>
        :root {
            --bg: #f8f9fa;
            --text: #212529;
            --btn-bg: #ffffff;
            --border: #dee2e6;
            --accent: #007bff;
        }

        /* This class will be toggled by JavaScript */
        .dark-mode {
            --bg: #121212;
            --text: #f8f9fa;
            --btn-bg: #1e1e1e;
            --border: #333333;
            --accent: #4da3ff;
        }

        body {
            margin: 0;
            display: grid;
            place-items: center;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: 0.3s;
        }

        .container {
            width: 100%;
            max-width: 300px;
            text-align: center;
            padding: 20px;
        }

        h1 { margin-bottom: 20px; font-weight: 600; }

        a {
            display: block;
            margin-bottom: 12px;
            padding: 15px;
            text-decoration: none;
            color: var(--text);
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: 0.2s;
            font-size: 14px;
        }

        a:hover {
            border-color: var(--accent);
            transform: scale(1.02);
            background: var(--accent);
            color: white;
        }

        /* Toggle Button Style */
        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--btn-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <button id="theme-toggle">Toggle Mode</button>

    <div class="container">
        <h1>ee6h0</h1>
        <a href="https://instagram.com/ee6h0/" target="_blank">Instagram</a>
        <a href="https://github.com/ee6h0/" target="_blank">GitHub</a>
        <a href="https://t.me/ee6h0/" target="_blank">Telegram</a>
        <a href="mailto:xexcn@proton.me">Mail</a>
    </div>

    <script>
        const btn = document.getElementById('theme-toggle');
        btn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
        });
    </script>

</body>
</html>
