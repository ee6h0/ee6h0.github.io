<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ee6h0</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111;
  --border: #222;
  --text: #eee;
  --muted: #666;
  --accent: #8b5cf6;
}

/* ── THEMES ── */
.sunset  { --bg:#130e09; --surface:#1c1410; --border:#342010; --text:#ffe8c8; --muted:#9a7550; --accent:#ff9f43; }
.forest  { --bg:#090f0b; --surface:#111a12; --border:#1e3520; --text:#d8f5dd; --muted:#5a8a62; --accent:#4cd963; }
.ice     { --bg:#09111a; --surface:#101d28; --border:#1a3040; --text:#d8f0ff; --muted:#4a7a9b; --accent:#4db8ff; }
.crimson { --bg:#120808; --surface:#1c1010; --border:#3a1515; --text:#ffe0e0; --muted:#8a4040; --accent:#ff4060; }
.gold    { --bg:#131109; --surface:#1c1a10; --border:#362e10; --text:#fff8d8; --muted:#8a7840; --accent:#ffcc33; }
.matrix  { --bg:#060e06; --surface:#0d170d; --border:#1a3a1a; --text:#d0ffd0; --muted:#408040; --accent:#39ff6e; }

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  min-height: 100vh;
  transition: background .4s, color .4s;
  user-select: none;
}

/* ── GRID BG ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--accent) 1px, transparent 1px),
    linear-gradient(90deg, var(--accent) 1px, transparent 1px);
  background-size: 48px 48px;
  opacity: .03;
  pointer-events: none;
  z-index: 0;
  transition: background .4s;
}

/* ── LAYOUT ── */
main {
  position: relative;
  z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 28px 20px 60px;
}

/* ── NAV ── */
nav {
  display: flex;
  gap: 20px;
  align-items: center;
  padding: 14px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 28px;
  backdrop-filter: blur(12px);
}

nav a {
  color: var(--muted);
  text-decoration: none;
  font-size: 13px;
  letter-spacing: .04em;
  transition: color .2s;
}
nav a:hover, nav a.active { color: var(--accent); }

nav .spacer { flex: 1; }

/* ── HERO ── */
.hero {
  display: flex;
  align-items: center;
  gap: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 28px;
  margin-bottom: 20px;
  transition: border-color .3s;
}
.hero:hover { border-color: var(--accent); }

.hero img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--border);
  flex-shrink: 0;
  pointer-events: none;
  transition: border-color .3s, transform .3s;
}
.hero:hover img { border-color: var(--accent); transform: scale(1.04); }

.hero h1 { font-size: 26px; margin-bottom: 4px; }
.hero p  { color: var(--muted); font-size: 12px; margin-bottom: 16px; }

.hero-links { display: flex; gap: 14px; flex-wrap: wrap; }
.hero-links a {
  color: var(--accent);
  text-decoration: none;
  font-size: 13px;
  transition: opacity .2s;
}
.hero-links a:hover { opacity: .7; }

/* ── SECTION ── */
section { margin-bottom: 20px; }

.label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 6px;
  transition: border-color .3s;
}
.card:hover { border-color: var(--accent); }

.card a {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-radius: 10px;
  color: var(--text);
  text-decoration: none;
  font-size: 14px;
  transition: background .2s, color .2s;
}
.card a:hover { background: var(--border); color: var(--accent); }

.card a span { color: var(--muted); font-size: 12px; }

/* ── CREATORS PAGE ── */
#creatorsPage { display: none; }

.page-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}

.page-header h2 { font-size: 18px; flex: 1; }

.btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 8px 14px;
  border-radius: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  transition: color .2s, border-color .2s;
}
.btn:hover { color: var(--accent); border-color: var(--accent); }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 8px;
}

.creator-item {
  display: block;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--muted);
  text-decoration: none;
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color .2s, border-color .2s;
}
.creator-item:hover { color: var(--accent); border-color: var(--accent); }

/* ── BACK BTN ── */
.back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--muted);
  cursor: pointer;
  font-size: 13px;
  background: none;
  border: none;
  padding: 0;
  margin-bottom: 0;
}
.back:hover { color: var(--accent); }

/* ── THEME DOT ── */
.theme-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  transition: transform .2s, background .3s;
  flex-shrink: 0;
}
.theme-dot:hover { transform: scale(1.4); }
</style>
</head>
<body>
<main>

  <!-- NAV -->
  <nav>
    <a href="#" onclick="show('home')" class="active" id="navHome">~/</a>
    <a href="https://github.com/ee6h0/ee6h0.github.io/" target="_blank">github</a>
    <div class="spacer"></div>
    <div class="theme-dot" onclick="nextTheme()" title="Switch theme"></div>
  </nav>

  <!-- HOME PAGE -->
  <div id="homePage">

    <!-- HERO -->
    <div class="hero">
      <img src="assets/images/octopus.png" alt="octopus">
      <div>
        <h1>ee6h0</h1>
        <p>[ai-generated]</p>
        <div class="hero-links">
          <a href="https://instagram.com/ee6h0/" target="_blank">instagram</a>
          <a href="https://t.me/bwz89/" target="_blank">telegram</a>
          <a href="mailto:xexcn@proton.me">mail</a>
        </div>
      </div>
    </div>

    <!-- INSTAGRAM SECTION -->
    <section>
      <p class="label">instagram</p>
      <div class="card">
        <a href="#" onclick="show('creators')">
          creators <span>→</span>
        </a>
        <a href="instagram/users">
          users <span>→</span>
        </a>
      </div>
    </section>

  </div>

  <!-- CREATORS PAGE -->
  <div id="creatorsPage">
    <div class="page-header">
      <button class="back btn" onclick="show('home')">← back</button>
      <h2>creators</h2>
      <button class="btn" onclick="sort(1)">A→Z</button>
      <button class="btn" onclick="sort(-1)">Z→A</button>
    </div>
    <div class="grid" id="grid">
      <a class="creator-item" href="https://www.instagram.com/dalitkrantikari/" target="_blank">dalitkrantikari</a>
      <a class="creator-item" href="https://www.instagram.com/b2und_/" target="_blank">b2und_</a>
      <a class="creator-item" href="https://www.instagram.com/deltaforce.ftw/" target="_blank">deltaforce.ftw</a>
      <a class="creator-item" href="https://www.instagram.com/joroedits/" target="_blank">joroedits</a>
      <a class="creator-item" href="https://www.instagram.com/kalludaket/" target="_blank">kalludaket</a>
      <a class="creator-item" href="https://www.instagram.com/verdict.is.here/" target="_blank">verdict.is.here</a>
      <a class="creator-item" href="#">unknown02</a>
      <a class="creator-item" href="#">unknown03</a>
    </div>
  </div>

</main>

<script>
/* THEMES */
const themes = ['', 'sunset', 'forest', 'ice', 'crimson', 'gold', 'matrix'];
let ti = Math.max(0, themes.indexOf(localStorage.getItem('theme') || ''));
if (themes[ti]) document.body.classList.add(themes[ti]);

function nextTheme() {
  document.body.classList.remove(...themes.filter(Boolean));
  ti = (ti + 1) % themes.length;
  if (themes[ti]) document.body.classList.add(themes[ti]);
  localStorage.setItem('theme', themes[ti]);
}

/* PAGES */
function show(page) {
  document.getElementById('homePage').style.display = page === 'home' ? '' : 'none';
  document.getElementById('creatorsPage').style.display = page === 'creators' ? '' : 'none';
  return false;
}

/* SORT */
function sort(dir) {
  const g = document.getElementById('grid');
  [...g.children]
    .sort((a, b) => dir * a.textContent.trim().localeCompare(b.textContent.trim()))
    .forEach(el => g.appendChild(el));
}

/* BLOCK IMG CONTEXT MENU */
document.addEventListener('contextmenu', e => { if (e.target.tagName === 'IMG') e.preventDefault(); });
</script>
</body>
</html>
