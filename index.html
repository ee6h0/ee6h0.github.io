<script>

let theme = 0;

function switchTheme(){

  theme++;

  document.body.classList.remove(
    "sunset",
    "forest",
    "ice"
  );

  if(theme % 4 === 1){

    document.body.classList.add("sunset");

  }

  else if(theme % 4 === 2){

    document.body.classList.add("forest");

  }

  else if(theme % 4 === 3){

    document.body.classList.add("ice");

  }

}

</script>
