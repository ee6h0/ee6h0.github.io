<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ee6h0</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">
  <style>
    /* CSS Variables for easy color management */
    :root {
      --bg-color: #f4f4f9;
      --text-color: #333333;
      --card-bg: #ffffff;
      --border-color: #e0e0e0;
      --hover-bg: #0056b3;
      --hover-text: #ffffff;
    }

    /* Automatic Dark Mode */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #121212;
        --text-color: #eaeaea;
        --card-bg: #1e1e1e;
        --border-color: #333333;
        --hover-bg: #4da3ff;
        --hover-text: #121212;
      }
    }

    body {
      margin: 0;
      display: grid;
      place-items: center;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      text-align: center;
      transition: background-color 0.3s, color 0.3s;
    }

    /* Container to keep buttons a consistent width */
    .link-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 320px;
      padding: 20px;
    }

    h1 {
      margin: 0 0 15px 0;
      font-weight: 600;
      font-size: 24px;
      letter-spacing: 1px;
    }

    /* Styling the links as buttons */
    a {
      display: block;
      padding: 14px 20px;
      text-decoration: none;
      color: var(--text-color);
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px; /* Rounded corners */
      font-weight: 400;
      font-size: 14px;
      transition: all 0.2s ease-in-out;
    }

    /* Hover and Focus Effects */
    a:hover, a:focus {
      background-color: var(--hover-bg);
      color: var(--hover-text);
      border-color: var(--hover-bg);
      transform: translateY(-2px); /* Slight lift effect */
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      outline: none;
    }
  </style>
</head>
<body>

  <div class="link-container">
    <h1>ee6h0</h1>
    <!-- target="_blank" opens links in a new tab -->
    <a href="https://instagram.com/ee6h0/" target="_blank" rel="noopener noreferrer">Instagram</a>
    <a href="https://github.com/ee6h0/" target="_blank" rel="noopener noreferrer">GitHub</a>
    <a href="https://t.me/ee6h0/" target="_blank" rel="noopener noreferrer">Telegram</a>
    <a href="mailto:xexcn@proton.me">Mail</a>
  </div>

</body>
</html>
