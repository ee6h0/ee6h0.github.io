<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Lyrical • Instagram Archive</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0f0f0f;
      color:#f5f5f5;
      font-family:Arial,sans-serif;
      line-height:1.6;
      padding:30px 16px;
    }

    .container{
      max-width:850px;
      margin:auto;
    }

    .hero{
      text-align:center;
      margin-bottom:35px;
    }

    .hero h1{
      font-size:3rem;
      margin-bottom:10px;
      letter-spacing:1px;
    }

    .subtitle{
      color:#b5b5b5;
      font-size:1rem;
      max-width:650px;
      margin:auto;
    }

    .card{
      background:#181818;
      border:1px solid #2a2a2a;
      border-radius:16px;
      overflow:hidden;
      transition:0.3s ease;
    }

    .card:hover{
      border-color:#3a3a3a;
      transform:translateY(-3px);
    }

    summary{
      list-style:none;
      cursor:pointer;
      padding:18px 22px;
      font-size:1.15rem;
      font-weight:bold;
      display:flex;
      align-items:center;
      justify-content:space-between;
      user-select:none;
    }

    summary::-webkit-details-marker{
      display:none;
    }

    summary::after{
      content:"+";
      font-size:1.4rem;
      transition:transform 0.3s ease;
    }

    details[open] summary::after{
      transform:rotate(45deg);
    }

    ul{
      list-style:none;
      padding:0 22px 20px;
    }

    li{
      border-bottom:1px solid #252525;
    }

    li:last-child{
      border-bottom:none;
    }

    a{
      display:block;
      padding:12px 0;
      color:#d0d0d0;
      text-decoration:none;
      transition:0.2s ease;
      word-break:break-all;
    }

    a:hover{
      color:#ffffff;
      padding-left:6px;
    }

    @media(max-width:600px){

      .hero h1{
        font-size:2.2rem;
      }

      summary{
        font-size:1rem;
      }

      a{
        font-size:0.95rem;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <div class="hero">
      <h1>Lyrical</h1>

      <p class="subtitle">
        Collection of lyrical Instagram reels.
      </p>
    </div>

    <details class="card" open>

      <summary>Instagram Links</summary>

      <ul>

        <li><a href="https://www.instagram.com/reel/DRmVb9zk2Pc/" target="_blank">https://www.instagram.com/reel/DRmVb9zk2Pc/</a></li>

        <li><a href="https://www.instagram.com/reel/DRB48GdkgtL/" target="_blank">https://www.instagram.com/reel/DRB48GdkgtL/</a></li>

        <li><a href="https://www.instagram.com/reel/DUdSu5xk-Ud/" target="_blank">https://www.instagram.com/reel/DUdSu5xk-Ud/</a></li>

        <li><a href="https://www.instagram.com/reel/DPqTNWEE-7F/" target="_blank">https://www.instagram.com/reel/DPqTNWEE-7F/</a></li>

      </ul>

    </details>

  </div>

</body>
</html>
