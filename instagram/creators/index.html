<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">

</head>

<body>

<div class="page">

<h1>Creators</h1>

<div class="line"></div>

<a class="home-btn" href="https://ee6h0.github.io/">
← home
</a>

<div class="sort-buttons">

  <button onclick="switchTheme()">
    Theme
  </button>

  <button onclick="sortAZ()">
    A → Z
  </button>

  <button onclick="sortZA()">
    Z → A
  </button>

</div>

<div class="creators-grid" id="creatorsGrid">

<a class="creator"
href="https://www.instagram.com/dalitkrantikari/"

</div>

</div>

<script>

/* THEME */

const savedTheme =
localStorage.getItem("theme");

if(savedTheme){

  document.body.classList.add(savedTheme);
}

let theme = 0;

function switchTheme(){

  const themes = [
    "",
    "sunset",
    "forest",
    "ice"
  ];

  theme++;

  const current =
  themes[theme % themes.length];

  document.body.classList.remove(
    "sunset",
    "forest",
    "ice"
  );

  if(current){

    document.body.classList.add(current);
  }

  localStorage.setItem(
    "theme",
    current
  );
}

/* SORT A-Z */

function sortAZ(){

  const grid =
  document.getElementById("creatorsGrid");

  const items =
  Array.from(
    grid.getElementsByClassName("creator")
  );

  items.sort((a,b)=>
    a.innerText.localeCompare(b.innerText)
  );

  grid.innerHTML = "";

  items.forEach(item =>
    grid.appendChild(item)
  );
}

/* SORT Z-A */

function sortZA(){

  const grid =
  document.getElementById("creatorsGrid");

  const items =
  Array.from(
    grid.getElementsByClassName("creator")
  );

  items.sort((a,b)=>
    b.innerText.localeCompare(a.innerText)
  );

  grid.innerHTML = "";

  items.forEach(item =>
    grid.appendChild(item)
  );
}

</script>

</body>
</html>
