<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creators</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050505;
  color:white;
  font-family:'JetBrains Mono', monospace;

  padding:40px 22px;
}

h1{
  font-size:20px;
  font-weight:400;
  margin-bottom:45px;

  color:#d1d1d1;
}

.creator-wall{

  display:grid;

  grid-template-columns:
  repeat(3,1fr);

  gap:18px 12px;
}

.creator-wall a{

  text-decoration:none;

  color:#6d6d6d;

  font-size:13px;

  font-weight:400;

  transition:0.18s ease;

  width:fit-content;
}

.creator-wall a:hover{

  color:#8b5cf6;

  transform:translateY(-2px);
}

.creator-wall a:nth-child(2){
  margin-left:14px;
}

.creator-wall a:nth-child(3){
  margin-top:8px;
}

.creator-wall a:nth-child(4){
  margin-left:30px;
}

.creator-wall a:nth-child(5){
  margin-top:14px;
}

.creator-wall a:nth-child(6){
  margin-left:8px;
}

.back{

  display:inline-block;

  margin-top:70px;

  text-decoration:none;

  color:#555;

  font-size:12px;
}

.back:hover{
  color:#8b5cf6;
}

</style>
</head>

<body>

<h1>Creators</h1>

<div class="creator-wall">

</div>

</body>
</html>
