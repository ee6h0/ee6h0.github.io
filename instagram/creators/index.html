<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creators</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>

html{
  scroll-behavior:smooth;
}

/* THEMES */

:root{

  --bg:#050505;
  --card:#0f0f0f;
  --border:#2a2a2a;

  --text:#d1d1d1;
  --text2:#777;

  --accent:#8b5cf6;
}

.sunset{

  --bg:#16110d;
  --card:#221912;
  --border:#3b2a1d;

  --text:#ffe7c2;
  --text2:#c9a97f;

  --accent:#ffb86b;
}

.forest{

  --bg:#0d1410;
  --card:#162019;
  --border:#2c3c30;

  --text:#dff5e1;
  --text2:#8da78f;

  --accent:#7ce38b;
}

.ice{

  --bg:#0b1116;
  --card:#131d25;
  --border:#243543;

  --text:#dcefff;
  --text2:#89a2b7;

  --accent:#6bbcff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:var(--bg);
  color:var(--text);

  font-family:'JetBrains Mono', monospace;

  padding:34px 24px;

  transition:0.3s ease;
}

/* PAGE */

.page{

  max-width:1100px;
  margin:auto;
}

/* TITLE */

h1{

  font-size:42px;

  font-weight:700;

  color:white;

  margin-bottom:10px;
}

/* LINE */

.line{

  width:100%;
  height:1px;

  background:var(--border);

  margin-bottom:26px;
}

/* HOME */

.home-btn{

  display:inline-block;

  margin-bottom:34px;

  text-decoration:none;

  color:var(--text2);

  font-size:13px;

  transition:0.2s;
}

.home-btn:hover{

  color:var(--accent);
}

/* BUTTONS */

.sort-buttons{

  display:flex;

  flex-wrap:wrap;

  gap:12px;

  margin-bottom:40px;
}

.sort-buttons button{

  background:none;

  border:1px solid var(--border);

  color:var(--text2);

  padding:10px 18px;

  border-radius:12px;

  font-family:'JetBrains Mono', monospace;

  cursor:pointer;

  transition:0.2s;
}

.sort-buttons button:hover{

  color:white;

  border-color:var(--accent);
}

/* GRID */

.creators-grid{

  display:grid;

  grid-template-columns:
  repeat(3, minmax(0, 1fr));

  gap:28px 40px;

  width:100%;
}

/* USERNAMES */

.creator{

  text-decoration:none;

  color:#7c7c7c;

  font-size:15px;

  transition:0.2s;

  word-break:break-word;
}

.creator:hover{

  color:var(--accent);
}

/* MOBILE */

@media(max-width:900px){

  .creators-grid{

    grid-template-columns:
    repeat(2, minmax(0, 1fr));
  }
}

@media(max-width:520px){

  body{

    padding:28px 20px;
  }

  h1{

    font-size:38px;
  }

  .creators-grid{

  grid-template-columns:
  repeat(3, minmax(0, 1fr));

  gap:18px 14px;
  }

  .sort-buttons{

    gap:10px;
  }

  .sort-buttons button{

    padding:10px 14px;

    font-size:13px;
  }
}

</style>

</head>

<body>

<div class="page">

<h1>Creators</h1>

<div class="line"></div>

<a class="home-btn" href="https://ee6h0.github.io/">
← home
</a>

<div class="sort-buttons">

  <button onclick="switchTheme()">
    Theme
  </button>

  <button onclick="sortAZ()">
    A → Z
  </button>

  <button onclick="sortZA()">
    Z → A
  </button>

</div>

<div class="creators-grid" id="creatorsGrid">

<a class="creator"
href="https://www.instagram.com/dalitkrantikari/"
target="_blank">
dalitkrantikari
</a>

<a class="creator"
href="https://www.instagram.com/b2und_/"
target="_blank">
b2und_
</a>

<a class="creator"
href="https://www.instagram.com/deltaforce.ftw/"
target="_blank">
deltaforce.ftw
</a>

<a class="creator"
href="https://www.instagram.com/joroedits/"
target="_blank">
joroedits
</a>

<a class="creator"
href="https://www.instagram.com/kalludaket/"
target="_blank">
kalludaket
</a>

<a class="creator"
href="#">
unknown01
</a>

<a class="creator"
href="#">
unknown02
</a>

<a class="creator"
href="#">
unknown03
</a>

</div>

</div>

<script>

let theme = 0;

function switchTheme(){

  theme++;

  document.body.classList.remove(
    "sunset",
    "forest",
    "ice"
  );

  if(theme % 4 === 1){

    document.body.classList.add("sunset");
  }

  else if(theme % 4 === 2){

    document.body.classList.add("forest");
  }

  else if(theme % 4 === 3){

    document.body.classList.add("ice");
  }
}

/* SORT */

function sortAZ(){

  const grid =
  document.getElementById("creatorsGrid");

  const items =
  Array.from(
    grid.getElementsByClassName("creator")
  );

  items.sort((a,b)=>
    a.innerText.localeCompare(b.innerText)
  );

  grid.innerHTML = "";

  items.forEach(item =>
    grid.appendChild(item)
  );
}

function sortZA(){

  const grid =
  document.getElementById("creatorsGrid");

  const items =
  Array.from(
    grid.getElementsByClassName("creator")
  );

  items.sort((a,b)=>
    b.innerText.localeCompare(a.innerText)
  );

  grid.innerHTML = "";

  items.forEach(item =>
    grid.appendChild(item)
  );
}

</script>

</body>
</html>
