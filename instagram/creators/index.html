<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creators</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:#050505;
  color:white;

  font-family:'JetBrains Mono', monospace;

  padding:28px 18px;
}

/* TITLE */

.header{

  display:flex;
  align-items:center;
  gap:12px;

  margin-bottom:40px;
}

.header h1{

  font-size:22px;
  font-weight:500;

  color:#d4d4d4;

  white-space:nowrap;
}

.line{

  width:100%;
  height:1px;

  background:#2a2a2a;
}

/* GRID */

.creator-grid{

  display:grid;

  grid-template-columns:
  repeat(4,1fr);

  gap:26px 12px;

  text-align:center;
}

/* LINKS */

.creator-grid a{

  text-decoration:none;

  color:#6d6d6d;

  font-size:13px;

  transition:0.2s ease;
}

.creator-grid a:hover{

  color:#8b5cf6;
}

/* MOBILE */

@media(max-width:700px){

  .creator-grid{

    grid-template-columns:
    repeat(4,1fr);

    gap:24px 8px;
  }

  .creator-grid a{

    font-size:11px;
  }
}

/* BACK */

.back{

  display:inline-block;

  margin-top:70px;

  text-decoration:none;

  color:#555;

  font-size:12px;
}

.back:hover{

  color:#8b5cf6;
}

</style>
</head>

<body>

<div class="header">

  <h1>Creators</h1>

  <div class="line"></div>

</div>

<div class="creator-grid">

  <a href="https://www.instagram.com/dalitkrantikari/" target="_blank">
    dalitkrantikari
  </a>

  <a href="https://www.instagram.com/b2und_/" target="_blank">
    b2und_
  </a>

  <a href="https://www.instagram.com/deltaforce.ftw/" target="_blank">
    deltaforce.ftw
  </a>

  <a href="https://www.instagram.com/joroedits/" target="_blank">
    joroedits
  </a>

  <a href="https://www.instagram.com/kalludaket/" target="_blank">
    kalludaket
  </a>

  <a href="#">
    unknown01
  </a>

  <a href="#">
    unknown02
  </a>

  <a href="#">
    unknown03
  </a>

</div>

<a class="back" href="../">
← back
</a>

</body>
</html>
