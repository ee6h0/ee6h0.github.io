<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creators</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:#050505;
  color:#d1d1d1;

  font-family:'JetBrains Mono', monospace;

  padding:40px 28px;
}


/* TITLE */

h1{

  font-size:52px;
  font-weight:700;

  color:white;

  margin:0;
}

/* LINE */

.line{

  width:100%;
  height:1px;

  background:#2a2a2a;

  margin-top:18px;
  margin-bottom:34px;
}

/* HOME BUTTON */

.home-btn{

  display:inline-block;

  margin-bottom:40px;

  text-decoration:none;

  color:#666;

  font-size:13px;

  transition:0.2s;
}

.home-btn:hover{

  color:#8b5cf6;
}

/* SORT */

.sort-buttons{

  display:flex;
  gap:14px;

  margin-bottom:44px;
}

.sort-buttons button{

  background:none;

  border:1px solid #2d2d2d;

  color:#8b8b8b;

  padding:10px 18px;

  border-radius:10px;

  font-family:'JetBrains Mono', monospace;

  cursor:pointer;

  transition:0.2s;
}

.sort-buttons button:hover{

  color:white;

  border-color:#666;
}

/* GRID */

.creators-grid{

  display:grid;

  grid-template-columns:
  repeat(4, 1fr);

  gap:34px 80px;
}

/* USERNAMES */

.creator{

  text-decoration:none;

  color:#7c7c7c;

  font-size:15px;

  transition:0.2s;
}

.creator:hover{

  color:#8b5cf6;
}

</style>

</head>

<body>

<div class="page">

<h1>Creators</h1>

<div class="line"></div>

<a class="home-btn" href="https://ee6h0.github.io/">
← home
</a>

<div class="sort-buttons">

  <button onclick="sortAZ()">
    A → Z
  </button>

  <button onclick="sortZA()">
    Z → A
  </button>

</div>

<div class="creators-grid" id="creatorsGrid">

<a class="creator"
href="https://www.instagram.com/dalitkrantikari/"
target="_blank">
dalitkrantikari
</a>

<a class="creator"
href="https://www.instagram.com/b2und_/"
target="_blank">
b2und_
</a>

<a class="creator"
href="https://www.instagram.com/deltaforce.ftw/"
target="_blank">
deltaforce.ftw
</a>

<a class="creator"
href="https://www.instagram.com/joroedits/"
target="_blank">
joroedits
</a>

<a class="creator"
href="https://www.instagram.com/kalludaket/"
target="_blank">
kalludaket
</a>

<a class="creator"
href="#">
unknown01
</a>

<a class="creator"
href="#">
unknown02
</a>

<a class="creator"
href="#">
unknown03
</a>

</div>

</div>

<script>

function sortAZ(){

  const grid =
  document.getElementById("creatorsGrid");

  const items =
  Array.from(
    grid.getElementsByClassName("creator")
  );

  items.sort((a,b)=>
    a.innerText.localeCompare(b.innerText)
  );

  grid.innerHTML = "";

  items.forEach(item =>
    grid.appendChild(item)
  );
}

function sortZA(){

  const grid =
  document.getElementById("creatorsGrid");

  const items =
  Array.from(
    grid.getElementsByClassName("creator")
  );

  items.sort((a,b)=>
    b.innerText.localeCompare(a.innerText)
  );

  grid.innerHTML = "";

  items.forEach(item =>
    grid.appendChild(item)
  );
}

</script>

</body>
</html>
