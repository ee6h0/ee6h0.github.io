<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creators</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050505;
  color:white;
  font-family:'JetBrains Mono', monospace;
  padding:28px;
}

.header{
  margin-bottom:60px;
}

.header h1{
  font-size:58px;
  margin-bottom:12px;
}

.header p{
  color:#777;
  line-height:1.7;
  max-width:500px;
}

.creator-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
}

.creator-grid a{
  text-decoration:none;
  color:#d1d1d1;

  border:1px solid #1d1d1d;
  background:#0b0b0b;

  padding:38px 20px;

  border-radius:22px;

  font-size:18px;
  font-weight:700;

  transition:0.2s ease;
}

.creator-grid a:hover{
  color:#8b5cf6;
  border-color:#8b5cf6;
  transform:translateY(-3px);
}

.creator-grid a:active{
  transform:scale(0.98);
}

.back{
  display:inline-block;
  margin-top:50px;

  text-decoration:none;
  color:#666;

  font-size:14px;
}

.back:hover{
  color:#8b5cf6;
}

@media(max-width:700px){

  .creator-grid{
    grid-template-columns:1fr;
  }

  .header h1{
    font-size:44px;
  }

}

</style>
</head>

<body>

<div class="header">

  <h1>Creators</h1>

  <p>
    saved accounts / archive references
  </p>

</div>

<div class="creator-grid">

  <a href="https://www.instagram.com/dalitkrantikari/" target="_blank">
    @dalitkrantikari
  </a>

  <a href="https://www.instagram.com/b2und_/" target="_blank">
    @b2und_
  </a>

  <a href="https://www.instagram.com/deltaforce.ftw/" target="_blank">
    @deltaforce.ftw
  </a>

  <a href="https://www.instagram.com/joroedits/" target="_blank">
    @joroedits
  </a>

  <a href="https://www.instagram.com/kalludaket/" target="_blank">
    @kalludaket
  </a>

  <a href="#">
    @unknown
  </a>

</div>

<a class="back" href="../">
← back
</a>

</body>
</html>
